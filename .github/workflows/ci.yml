name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-package:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify repository integrity
        run: npm run verify

      - name: Build workspace
        run: npm run build

      - name: Package extension
        run: npm run package -w extension -- --out codus-${{ github.run_number }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: codus-vsix
          path: extension/codus-${{ github.run_number }}.vsix
          if-no-files-found: error
