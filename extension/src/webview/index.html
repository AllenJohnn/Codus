<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codus Room</title>
  <style>
    * {
      box-sizing: border-box;
      border-radius: 0;
      font-family: 'Courier New', monospace;
    }

    :root {
      --panel: #111;
      --surface-0: #000;
      --surface-1: #0a0a0a;
      --text-strong: #fff;
      --text-mid: #888;
      --text-label: #444;
      --text-muted: #333;
      --text-header: #555;
      --line: #222;
      --line-input: #2a2a2a;
      --line-active: #555;
      --danger-line: #500;
      --danger-text: #c55;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--panel);
      color: var(--text-mid);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.4;
    }

    input,
    button,
    textarea,
    select {
      font-family: 'Courier New', monospace;
    }

    .panel {
      display: grid;
      gap: 8px;
      padding: 8px;
    }

    .reconnect-banner {
      display: none;
      background: #1a1a1a;
      color: #555;
      font-size: 10px;
      text-transform: lowercase;
      padding: 2px 10px;
      border: 1px solid #222;
    }

    .reconnect-banner.show {
      display: block;
    }

    .section {
      border: 1px solid var(--line);
      padding: 12px 14px;
      display: grid;
      gap: 8px;
    }

    .header {
      border: 1px solid var(--line);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-header);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header-sep {
      width: 1px;
      height: 10px;
      background: #333;
      flex: 0 0 auto;
    }

    .label {
      color: var(--text-label);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .room-block.disconnected {
      opacity: 0.4;
    }

    .room-id {
      color: var(--text-strong);
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      line-height: 1;
      margin: 0;
    }

    .room-id.disconnected {
      color: #333;
    }

    .room-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-height: 20px;
    }

    .status-left {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      text-transform: lowercase;
      white-space: nowrap;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      background: #333;
      flex: 0 0 auto;
    }

    .status-dot.connected {
      background: #fff;
    }

    .status-text.disconnected {
      color: #333;
    }

    .status-text.connected {
      color: #888;
    }

    .status-right {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .user-badge {
      border: 1px solid var(--line);
      color: #666;
      padding: 1px 5px;
      font-size: 10px;
      white-space: nowrap;
      text-transform: lowercase;
    }

    button {
      text-transform: lowercase;
      border: 1px solid #333;
      background: transparent;
      color: var(--text-mid);
      padding: 4px 6px;
      font-size: 10px;
      cursor: pointer;
    }

    button:hover {
      border-color: #555;
      color: var(--text-strong);
    }

    #leaveRoom {
      border-color: var(--danger-line);
      color: var(--danger-text);
    }

    #leaveRoom:hover {
      border-color: var(--danger-line);
      color: var(--danger-text);
    }

    .readonly-btn {
      border: 1px solid #2a2a2a;
      color: #555;
      font-size: 9px;
      padding: 2px 6px;
      display: none;
    }

    .readonly-btn.show {
      display: inline-block;
    }

    .create-btn {
      width: 100%;
      border: none;
      background: var(--text-strong);
      color: #000;
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 8px;
    }

    .create-btn:hover {
      border: none;
      color: #000;
      background: #dcdcdc;
    }

    .row-flush {
      display: flex;
      align-items: stretch;
      gap: 0;
    }

    input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line-input);
      background: var(--surface-0);
      color: var(--text-mid);
      padding: 7px 8px;
      font-size: 10px;
      outline: none;
    }

    input::placeholder {
      color: var(--text-muted);
      opacity: 1;
    }

    input:focus {
      border-color: var(--line-active);
      color: var(--text-strong);
    }

    #joinCode {
      border-right: none;
      text-align: center;
      letter-spacing: 0.2em;
    }

    #joinForm button {
      border: 1px solid var(--line-input);
      color: var(--text-mid);
      min-width: 52px;
      padding: 0 8px;
      background: transparent;
    }

    .identity {
      border-left: 2px solid #222;
      padding-left: 8px;
      color: #444;
      font-size: 10px;
      text-transform: lowercase;
      min-height: 14px;
    }

    .identity-name {
      color: var(--text-mid);
    }

    #users {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 4px;
    }

    .user {
      border: 1px solid var(--line);
      padding: 5px 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      cursor: pointer;
    }

    .user.self {
      cursor: default;
    }

    .user-main {
      display: grid;
      gap: 1px;
      min-width: 0;
      flex: 1;
    }

    .user-name-row {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }

    .user-name {
      color: #aaa;
      font-size: 11px;
      text-transform: lowercase;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .user-file {
      color: #444;
      font-size: 9px;
      text-transform: lowercase;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 20ch;
    }

    .following-tag {
      color: #555;
      font-size: 9px;
      text-transform: lowercase;
    }

    .you-tag {
      color: #333;
      font-size: 9px;
      text-transform: lowercase;
      margin-left: auto;
    }

    .waiting {
      color: #2a2a2a;
      font-size: 10px;
      text-transform: lowercase;
    }

    #chatLog {
      min-height: 56px;
      max-height: 220px;
      overflow-y: auto;
      background: var(--surface-1);
      border: 1px solid #1a1a1a;
      padding: 8px;
      display: grid;
      gap: 4px;
    }

    .chat-empty {
      color: #2a2a2a;
      font-size: 10px;
      text-transform: lowercase;
    }

    .chat-message {
      font-size: 10px;
      line-height: 1.6;
      color: var(--text-mid);
      white-space: pre-wrap;
      word-break: break-word;
      padding-top: 6px;
    }

    .chat-message + .chat-message {
      border-top: 1px dashed #222;
      margin-top: 2px;
    }

    .chat-system {
      text-align: center;
      font-size: 10px;
      color: #333;
      font-style: italic;
      padding-top: 4px;
      padding-bottom: 2px;
      border-top: 1px dashed #222;
      margin-top: 2px;
    }

    .chat-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
      color: #555;
      font-size: 9px;
      text-transform: lowercase;
    }

    .chat-line {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-code {
      margin-top: 3px;
      margin-bottom: 3px;
      border: 1px solid #1f1f1f;
      background: #000;
      color: #aaa;
      padding: 6px;
      white-space: pre-wrap;
      overflow-x: auto;
    }

    .chat-code-wrap {
      display: grid;
      gap: 2px;
    }

    .chat-code-actions {
      display: flex;
      justify-content: flex-end;
    }

    .chat-copy {
      border: 1px solid #2a2a2a;
      padding: 1px 5px;
      font-size: 9px;
      color: #777;
    }

    .chat-author {
      color: #666;
    }

    .chat-index {
      color: #444;
    }

    .insert-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .insert-label {
      color: #333;
      font-size: 9px;
      text-transform: lowercase;
    }

    .chat-insert {
      border: 1px solid #1e1e1e;
      padding: 2px 6px;
      font-size: 9px;
      color: #555;
      background: transparent;
    }

    #chatInput {
      border: 1px solid var(--line-input);
      background: #000;
      color: #888;
      padding: 7px 8px;
      font-size: 10px;
      line-height: 1.5;
      height: 56px;
      max-height: 56px;
      min-height: 56px;
      resize: none;
      overflow-y: auto;
      width: 100%;
      outline: none;
    }

    #chatInput:focus {
      border-color: #555;
      color: #fff;
    }

    .chat-send-row {
      display: flex;
      gap: 0;
    }

    #chatForm button {
      border: none;
      background: #fff;
      color: #000;
      min-width: 52px;
      padding: 0 8px;
      font-size: 10px;
      letter-spacing: 0.04em;
    }

    .hint {
      text-align: right;
      color: #2a2a2a;
      font-size: 9px;
      white-space: pre;
      text-transform: lowercase;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="reconnectBanner" class="reconnect-banner">reconnecting...</div>

  <div class="panel">
    <header class="header">
      <span class="header-sep"></span>
      <span>CODUS / COLLABORATIVE ROOM</span>
    </header>

    <section class="section">
      <div class="label">CURRENT ROOM</div>

      <div id="roomBlock" class="room-block disconnected">
        <div id="roomId" class="room-id disconnected">- - - -</div>

        <div class="room-meta">
          <div class="status-left">
            <span id="statusDot" class="status-dot"></span>
            <span id="connectionState" class="status-text disconnected">disconnected</span>
          </div>
          <div class="status-right">
            <button id="readOnlyToggle" class="readonly-btn" type="button">lock room</button>
            <span id="userCount" class="user-badge">0 users</span>
            <button id="copyRoomId" type="button">copy</button>
            <button id="copyRoomLink" type="button">link</button>
            <button id="leaveRoom" type="button">leave</button>
          </div>
        </div>
      </div>

      <button id="createRoom" class="create-btn" type="button">create room</button>

      <form id="joinForm" class="row-flush">
        <input id="joinCode" type="text" placeholder="_ _ _ _" maxlength="4" inputmode="numeric" pattern="[0-9]{4}" />
        <button type="submit">join</button>
      </form>

      <div id="localUser" class="identity">you are <span class="identity-name">guest</span></div>
    </section>

    <section class="section">
      <div class="label">CONNECTED USERS</div>
      <ul id="users"></ul>
      <div id="waitingText" class="waiting" hidden>no other users</div>
    </section>

    <section class="section">
      <div class="label">CHAT</div>
      <div id="chatLog"></div>

      <div class="insert-row">
        <span class="insert-label">insert:</span>
        <button id="pasteSelectionCode" class="chat-insert" type="button">paste sel</button>
        <button id="insertCodeBlock" class="chat-insert" type="button">code block</button>
      </div>

      <form id="chatForm" class="chat-send-row">
        <textarea id="chatInput" placeholder="share code, notes, fixes..." maxlength="4000"></textarea>
        <button type="submit">send</button>
      </form>

      <div class="hint">alt+enter  send
enter      newline</div>
    </section>
  </div>

  <script nonce="{{nonce}}">
    const vscode = acquireVsCodeApi();
    const state = {
      connectionState: {
        status: 'disconnected',
        roomId: null,
        userCount: 0,
      },
      roomState: {
        roomId: null,
        users: [],
        isReadOnly: false,
        isCreator: false,
      },
      chatMessages: [],
      localUserName: 'Guest',
      followedUserId: null,
    };

    const roomBlockEl = document.getElementById('roomBlock');
    const roomIdEl = document.getElementById('roomId');
    const statusDotEl = document.getElementById('statusDot');
    const connectionStateEl = document.getElementById('connectionState');
    const userCountEl = document.getElementById('userCount');
    const usersEl = document.getElementById('users');
    const chatLogEl = document.getElementById('chatLog');
    const chatFormEl = document.getElementById('chatForm');
    const chatInputEl = document.getElementById('chatInput');
    const insertCodeBlockEl = document.getElementById('insertCodeBlock');
    const pasteSelectionCodeEl = document.getElementById('pasteSelectionCode');
    const localUserEl = document.getElementById('localUser');
    const joinFormEl = document.getElementById('joinForm');
    const joinCodeEl = document.getElementById('joinCode');
    const copyRoomIdButtonEl = document.getElementById('copyRoomId');
    const copyRoomLinkButtonEl = document.getElementById('copyRoomLink');
    const waitingTextEl = document.getElementById('waitingText');
    const reconnectBannerEl = document.getElementById('reconnectBanner');
    const readOnlyToggleEl = document.getElementById('readOnlyToggle');

    document.getElementById('createRoom').addEventListener('click', () => {
      vscode.postMessage({ type: 'createRoom' });
    });

    joinCodeEl.addEventListener('input', () => {
      const digitsOnly = joinCodeEl.value.replace(/\D/g, '').slice(0, 4);
      if (joinCodeEl.value !== digitsOnly) {
        joinCodeEl.value = digitsOnly;
      }
    });

    joinFormEl.addEventListener('submit', (event) => {
      event.preventDefault();
      const code = joinCodeEl.value.replace(/\D/g, '').slice(0, 4);
      if (code.length !== 4) {
        return;
      }

      vscode.postMessage({ type: 'joinRoom', roomId: code });
    });

    copyRoomIdButtonEl.addEventListener('click', () => {
      vscode.postMessage({ type: 'copyRoomId' });
      const previous = copyRoomIdButtonEl.textContent;
      copyRoomIdButtonEl.textContent = 'copied';
      setTimeout(() => {
        copyRoomIdButtonEl.textContent = previous || 'copy';
      }, 1200);
    });

    copyRoomLinkButtonEl.addEventListener('click', () => {
      vscode.postMessage({ type: 'copyRoomLink' });
      const previous = copyRoomLinkButtonEl.textContent;
      copyRoomLinkButtonEl.textContent = 'copied!';
      setTimeout(() => {
        copyRoomLinkButtonEl.textContent = previous || 'link';
      }, 1500);
    });

    readOnlyToggleEl.addEventListener('click', () => {
      const nextValue = !state.roomState.isReadOnly;
      vscode.postMessage({ type: 'setReadOnly', isReadOnly: nextValue });
    });

    document.getElementById('leaveRoom').addEventListener('click', () => {
      vscode.postMessage({ type: 'leaveRoom' });
    });

    chatFormEl.addEventListener('submit', (event) => {
      event.preventDefault();
      const value = chatInputEl.value.trim();
      if (!value) {
        return;
      }
      vscode.postMessage({ type: 'sendChatMessage', text: value });
      chatInputEl.value = '';
    });

    chatInputEl.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter') {
        return;
      }

      if (event.altKey) {
        event.preventDefault();
        chatFormEl.requestSubmit();
      }
    });

    insertCodeBlockEl.addEventListener('click', () => {
      const template = '```\n\n```';
      const caret = insertAtCursor(template);
      chatInputEl.focus();
      chatInputEl.setSelectionRange(caret, caret);
    });

    pasteSelectionCodeEl.addEventListener('click', () => {
      vscode.postMessage({ type: 'insertSelectionAsCode' });
      chatInputEl.focus();
    });

    window.addEventListener('message', (event) => {
      const message = event.data;
      if (message && message.type === 'insertComposerText' && typeof message.text === 'string') {
        const caret = insertAtCursor(message.text);
        chatInputEl.focus();
        chatInputEl.setSelectionRange(caret, caret);
        return;
      }

      if (!message || message.type !== 'state') {
        return;
      }

      state.connectionState = message.payload.connectionState;
      state.roomState = message.payload.roomState;
      state.chatMessages = message.payload.chatMessages;
      state.localUserName = message.payload.localUserName;
      state.followedUserId = message.payload.followedUserId;
      render();
    });

    function render() {
      const connected = state.connectionState.status === 'connected';
      const reconnecting = state.connectionState.status === 'reconnecting';
      const roomId = state.roomState.roomId;

      reconnectBannerEl.classList.toggle('show', reconnecting);

      roomBlockEl.classList.toggle('disconnected', !connected);

      if (connected && roomId) {
        roomIdEl.textContent = roomId;
        roomIdEl.classList.remove('disconnected');
      } else {
        roomIdEl.textContent = '- - - -';
        roomIdEl.classList.add('disconnected');
      }

      statusDotEl.classList.toggle('connected', connected);
      connectionStateEl.classList.toggle('connected', connected);
      connectionStateEl.classList.toggle('disconnected', !connected);
      connectionStateEl.textContent = connected ? 'connected' : 'disconnected';

      userCountEl.textContent = `${state.connectionState.userCount} user${state.connectionState.userCount === 1 ? '' : 's'}`;
      localUserEl.innerHTML = `you are <span class="identity-name">${escapeHtml(state.localUserName)}</span>`;

      if (state.roomState.isCreator) {
        readOnlyToggleEl.classList.add('show');
        readOnlyToggleEl.textContent = state.roomState.isReadOnly ? 'unlock room' : 'lock room';
      } else {
        readOnlyToggleEl.classList.remove('show');
      }

      usersEl.textContent = '';
      const others = state.roomState.users.filter((user) => user.name !== state.localUserName);
      waitingTextEl.hidden = others.length > 0;

      for (const user of state.roomState.users) {
        const li = document.createElement('li');
        li.className = 'user';

        const dot = document.createElement('span');
        dot.className = 'status-dot connected';

        const userMain = document.createElement('div');
        userMain.className = 'user-main';

        const nameRow = document.createElement('div');
        nameRow.className = 'user-name-row';

        const userName = document.createElement('span');
        userName.className = 'user-name';
        userName.textContent = user.name;

        nameRow.appendChild(userName);

        if (state.followedUserId === user.id && user.name !== state.localUserName) {
          const following = document.createElement('span');
          following.className = 'following-tag';
          following.textContent = 'following';
          nameRow.appendChild(following);
        }

        const fileName = document.createElement('div');
        fileName.className = 'user-file';
        fileName.textContent = (user.currentFile || 'no file').slice(0, 20);

        userMain.appendChild(nameRow);
        userMain.appendChild(fileName);

        li.appendChild(dot);
        li.appendChild(userMain);

        if (user.name === state.localUserName) {
          li.classList.add('self');
          const youTag = document.createElement('span');
          youTag.className = 'you-tag';
          youTag.textContent = 'you';
          li.appendChild(youTag);
        } else {
          li.addEventListener('click', () => {
            const next = state.followedUserId === user.id ? null : user.id;
            vscode.postMessage({ type: 'followUser', userId: next });
          });
        }

        usersEl.appendChild(li);
      }

      chatLogEl.textContent = '';
      if (state.chatMessages.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'chat-empty';
        empty.textContent = 'no messages yet';
        chatLogEl.appendChild(empty);
      }

      for (let index = 0; index < state.chatMessages.length; index += 1) {
        const message = state.chatMessages[index];

        if (message.system) {
          const system = document.createElement('div');
          system.className = 'chat-system';
          system.textContent = message.text;
          chatLogEl.appendChild(system);
          continue;
        }

        const line = document.createElement('div');
        line.className = 'chat-message';

        const meta = document.createElement('div');
        meta.className = 'chat-meta';

        const author = document.createElement('span');
        author.className = 'chat-author';
        author.textContent = `${message.authorName}: `;

        const metaRight = document.createElement('span');
        metaRight.className = 'chat-index';
        const time = new Date(message.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        metaRight.textContent = `#${index + 1} ${time}`;

        meta.appendChild(author);
        meta.appendChild(metaRight);

        const body = document.createElement('div');
        const segments = splitMessageSegments(message.text);
        for (const segment of segments) {
          if (segment.type === 'code') {
            const codeWrap = document.createElement('div');
            codeWrap.className = 'chat-code-wrap';

            const codeActions = document.createElement('div');
            codeActions.className = 'chat-code-actions';

            const copyButton = document.createElement('button');
            copyButton.type = 'button';
            copyButton.className = 'chat-copy';
            copyButton.textContent = 'copy code';
            copyButton.addEventListener('click', () => {
              vscode.postMessage({ type: 'copyCode', text: segment.value });
              copyButton.textContent = 'copied';
              setTimeout(() => {
                copyButton.textContent = 'copy code';
              }, 1200);
            });

            const code = document.createElement('pre');
            code.className = 'chat-code';
            code.textContent = segment.value;

            codeActions.appendChild(copyButton);
            codeWrap.appendChild(codeActions);
            codeWrap.appendChild(code);
            body.appendChild(codeWrap);
            continue;
          }

          const text = document.createElement('div');
          text.className = 'chat-line';
          text.textContent = segment.value;
          body.appendChild(text);
        }

        line.appendChild(meta);
        line.appendChild(body);
        chatLogEl.appendChild(line);
      }

      chatLogEl.scrollTop = chatLogEl.scrollHeight;
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function splitMessageSegments(message) {
      const segments = [];
      const pattern = /```([\s\S]*?)```/g;
      let lastIndex = 0;
      let match = pattern.exec(message);

      while (match) {
        if (match.index > lastIndex) {
          segments.push({ type: 'text', value: message.slice(lastIndex, match.index) });
        }

        segments.push({ type: 'code', value: match[1].trim() });
        lastIndex = pattern.lastIndex;
        match = pattern.exec(message);
      }

      if (lastIndex < message.length) {
        segments.push({ type: 'text', value: message.slice(lastIndex) });
      }

      if (segments.length === 0) {
        segments.push({ type: 'text', value: message });
      }

      return segments;
    }

    function insertAtCursor(text) {
      const current = chatInputEl.value;
      const selectionStart = chatInputEl.selectionStart ?? current.length;
      const selectionEnd = chatInputEl.selectionEnd ?? current.length;
      chatInputEl.value = `${current.slice(0, selectionStart)}${text}${current.slice(selectionEnd)}`;
      return selectionStart + text.length;
    }

    render();
  </script>
